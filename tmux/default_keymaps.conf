# -----------------------------------------------------------------------------
# 1. Prefix and Global settings
# -----------------------------------------------------------------------------
# Unbind all keys if you want a completely clean slate first:
# unbind-key -a

# Ensure the prefix is set (default is C-b)
# set -g prefix C-b
# bind-key C-b send-prefix

# -----------------------------------------------------------------------------
# 2. Session Management
# -----------------------------------------------------------------------------
bind-key s choose-tree -s                               # Switch Session (User's alternative)
bind-key \$ command-prompt -I "#S" "rename-session '%%'" # Rename session
bind-key d detach-client                                # Detach
bind-key \( switch-client -p                             # Previous session
bind-key \) switch-client -n                             # Next session
bind-key L switch-client -l                             # Last session
bind-key D choose-client                                # Choose client to detach

# -----------------------------------------------------------------------------
# 3. Window Management
# -----------------------------------------------------------------------------
# bind-key c new-window                                   # New window
# bind-key , command-prompt -I "#W" "rename-window '%%'"  # Rename window
bind-key w choose-tree -w                               # Choose window interactively
# bind-key n next-window                                  # Next window
# bind-key p previous-window                              # Previous window
# bind-key l last-window                                  # Last window
# bind-key & confirm-before -p "kill-window #W? (y/n)" kill-window
bind-key \' command-prompt -p index "select-window -t ':%%'"
# bind-key . command-prompt "move-window -t '%%'"
# bind-key f command-prompt "find-window '%%'"

# Select windows by number
bind-key 0 select-window -t :0
bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5
bind-key 6 select-window -t :6
bind-key 7 select-window -t :7
bind-key 8 select-window -t :8
bind-key 9 select-window -t :9

# -----------------------------------------------------------------------------
# 4. Pane Management
# -----------------------------------------------------------------------------
# bind-key \" split-window -v                            # Horizontal split
# bind-key \%   split-window -h                            # Vertical split
# bind-key x   confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key z   resize-pane -Z                             # Zoom toggle
# bind-key o   select-pane -t :.+                         # Cycle panes
bind-key \; last-pane                                  # Last active pane
bind-key q   display-panes                              # Show pane numbers
bind-key !   break-pane                                 # Move pane to new window
bind-key \{   swap-pane -U                               # Swap pane up
bind-key \}   swap-pane -D                               # Swap pane down
bind-key Space next-layout                              # Cycle layouts

# Pane navigation (Arrows)
bind-key Up    select-pane -U
bind-key Down  select-pane -D
bind-key Left  select-pane -L
bind-key Right select-pane -R

# -----------------------------------------------------------------------------
# 5. Copy Mode & Buffers
# -----------------------------------------------------------------------------
# bind-key \[ copy-mode                                    # Enter copy mode
# bind-key \] paste-buffer                                 # Paste
bind-key \# list-buffers                                 # List buffers
bind-key \= choose-buffer                                # Choose buffer to paste
# bind-key \- delete-buffer                                # Delete buffer

# -----------------------------------------------------------------------------
# 6. Miscellaneous
# -----------------------------------------------------------------------------
bind-key \? list-keys                                    # Help / List bindings
bind-key \: command-prompt                               # Tmux command prompt
# bind-key t clock-mode                                   # Digital clock
# bind-key r refresh-client                               # Redraw screen
bind-key \~ show-messages                                # Show tmux log
bind-key C-o rotate-window                              # Rotate panes
bind-key C-z suspend-client                             # Suspend tmux
